<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blender Models Portfolio</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Dynamic local list auto-generated by the bat script! Bypasses CORS. -->
  <script src="models/models_list.js" onerror="window.MODELS_LIST = null;"></script>
  
  <style>
    :root {
      --bg-color: #f8fafc; /* Crisp Off-white */
      --text-color: #334155; /* Dark slate text */
      --accent: #0ea5e9; /* Light blue accent */
      --glass-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(0, 0, 0, 0.1);
    }
    
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Light mode viewer styling */
    model-viewer {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      background-color: transparent;
      --poster-color: transparent;
      outline: none;
    }
    
    #ui-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 2rem; box-sizing: border-box; z-index: 10;
    }
    
    .header {
      text-align: center; background: var(--glass-bg);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 1.5rem 3rem; border-radius: 16px;
      border: 1px solid var(--glass-border); align-self: center;
      pointer-events: auto; box-shadow: 0 4px 30px rgba(0,0,0,0.06);
      animation: slideDown 0.5s ease-out forwards;
    }
    
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .header h1 { 
      margin: 0; font-size: 1.75rem; font-weight: 600;
      color: #0f172a;
    }
    .header p { margin: 0.5rem 0 0; color: #64748b; font-size: 0.95rem; }
    
    /* Dropdown UI */
    .controls {
      display: flex; gap: 1rem; align-self: center;
      pointer-events: auto; background: var(--glass-bg);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 1rem 1.5rem; border-radius: 16px;
      border: 1px solid var(--glass-border); box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      margin-bottom: 2rem;
      align-items: center;
    }
    
    .dropdown {
      padding: 0.8rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: white;
      font-family: inherit;
      font-size: 1rem;
      color: #0f172a;
      cursor: pointer;
      min-width: 250px;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    
    .dropdown:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2); }
    
    .camera-panel {
      position: absolute; right: 2rem; top: 2rem; width: 320px;
      pointer-events: auto; background: var(--glass-bg);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 1.5rem; border-radius: 16px;
      border: 1px solid var(--glass-border); box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }
    
    .camera-panel h3 {
      margin: 0 0 1rem 0; font-size: 1.15rem; display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid var(--glass-border); padding-bottom: 0.75rem; color: #0f172a;
    }
    
    .control-group { margin-bottom: 1.2rem; }
    .control-group label {
      display: block; font-size: 0.85rem; color: #475569; margin-bottom: 0.5rem; font-weight: 500;
    }
    .slider-row { display: flex; align-items: center; gap: 0.75rem; }
    .slider-row input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
    .slider-row span {
      font-variant-numeric: tabular-nums; font-family: monospace;
      font-size: 0.9rem; min-width: 45px; text-align: right; background: rgba(0,0,0,0.05);
      padding: 0.2rem 0.4rem; border-radius: 4px; color: #334155; font-weight: 500;
    }
    
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 0.6rem 1rem; border-radius: 6px; font-size: 0.9rem;
      font-family: inherit; cursor: pointer; font-weight: 500; transition: all 0.2s;
    }
    .btn:hover { background: #0284c7; transform: translateY(-1px); }
    
    .fade-in { animation: fadeIn 0.5s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- Removed disable-zoom to restore native mobile pinch-to-zoom! Mouse scroll is intercepted below. -->
  <model-viewer 
    id="viewer" 
    camera-controls 
    bounds="tight"
    orientation="0deg 0deg 0deg"
    max-camera-orbit="auto auto 1000%"
    shadow-intensity="1.5"
    shadow-softness="1"
    exposure="1"
    environment-image="neutral"
    alt="3D Model Viewer">
  </model-viewer>

  <div id="ui-container">
    <div class="header">
      <h1 id="model-title">Model Portfolio</h1>
      <p>Select a model from the dropdown to load</p>
    </div>
    
    <div class="camera-panel">
      <h3>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        Camera Settings
      </h3>
      
      <div class="control-group">
        <label>Field of View (FOV/Lens)</label>
        <div class="slider-row">
          <input type="range" id="fov-slider" min="10" max="150" value="30">
          <span id="fov-val">30°</span>
        </div>
      </div>
      
      <div class="control-group">
        <label>View Axis Rotation (Roll)</label>
        <div class="slider-row">
          <input type="range" id="roll-slider" min="-180" max="180" value="0">
          <span id="roll-val">0°</span>
        </div>
      </div>
      
      <button class="btn" onclick="resetCamera()" style="width: 100%; margin-top: 10px;">Reset Camera</button>
    </div>
    
    <div class="controls">
      <label for="model-selector" style="font-weight: 500; font-size: 0.95rem; color: #475569;">Viewing:</label>
      <select id="model-selector" class="dropdown">
        <option value="" disabled selected>Loading models list...</option>
      </select>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const selector = document.getElementById('model-selector');
    const titleEl = document.getElementById('model-title');
    
    const fovSlider = document.getElementById('fov-slider');
    const rollSlider = document.getElementById('roll-slider');
    const fovVal = document.getElementById('fov-val');
    const rollVal = document.getElementById('roll-val');

    // Load from local javascript variable bypassing JSON CORS restrictions
    function populateDropdown() {
      selector.innerHTML = ''; 
      
      if (!window.MODELS_LIST) {
        selector.innerHTML = '<option disabled>Please double-click update_models.bat first.</option>';
        return;
      }
      
      const models = window.MODELS_LIST;
      
      if(models.length === 0) {
        selector.innerHTML = '<option disabled>No models found in folder.</option>';
        return;
      }
      
      // Add options
      models.forEach(model => {
        const option = document.createElement('option');
        option.value = `models/${model}`;
        // Clean up string for clean display: remove .glb and replace underscores
        option.textContent = model.replace(/\.(glb|gltf)$/i, '').replace(/_/g, ' ');
        selector.appendChild(option);
      });
      
      // Auto-load first model in list
      loadModel(selector.value, selector.options[0].textContent);
    }
    
    // Execute immediately 
    populateDropdown();

    // Handle Dropdown Selection
    selector.addEventListener('change', (e) => {
      const selectedOption = e.target.options[e.target.selectedIndex];
      loadModel(e.target.value, selectedOption.textContent);
    });

    function loadModel(url, displayName) {
      if (!url) return;
      viewer.src = url; 
      
      viewer.classList.remove('fade-in');
      void viewer.offsetWidth;
      viewer.classList.add('fade-in');
      titleEl.textContent = displayName;
    }

    // --- SLOW FINE-TUNED ZOOM LOGIC ---
    // Here we intercept the mouse wheel. It natively prevents the super fast component zoom, 
    // replacing it with our slow slider equation. Touch pinch-to-zoom is safely ignored by this!
    viewer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const currentOrbit = viewer.getCameraOrbit(); // {theta, phi, radius}
      
      // zoomSpeed controls the multiplier. 0.05 = 5% change per wheel tick. 
      const zoomSpeed = 0.05; 
      const delta = e.deltaY > 0 ? (1 + zoomSpeed) : (1 - zoomSpeed);
      
      let newRadius = currentOrbit.radius * delta;
      
      // Clamp bounds extensively
      if(newRadius < 0.001) newRadius = 0.001;
      if(newRadius > 500000) newRadius = 500000;
      
      viewer.cameraOrbit = `${currentOrbit.theta}rad ${currentOrbit.phi}rad ${newRadius}m`;
    }, { passive: false });

    // --- CAMERA SLIDER LOGIC ---
    fovSlider.addEventListener('input', () => {
      const fov = fovSlider.value;
      document.getElementById('fov-val').textContent = `${fov}°`;
      viewer.fieldOfView = `${fov}deg`;
    });

    rollSlider.addEventListener('input', () => {
      const roll = rollSlider.value;
      document.getElementById('roll-val').textContent = `${roll}°`;
      
      // Use native orientation to roll the model rather than CSS, preserving solid camera math
      viewer.orientation = `0deg 0deg ${roll}deg`;
    });

    window.resetCamera = function() {
      viewer.cameraOrbit = "0deg 90deg auto";
      viewer.fieldOfView = "30deg";
      viewer.cameraTarget = "auto auto auto";
      
      fovSlider.value = 30; document.getElementById('fov-val').textContent = "30°";
      rollSlider.value = 0; document.getElementById('roll-val').textContent = "0°";
      
      // Reset orientation instead of CSS style
      viewer.orientation = `0deg 0deg 0deg`;
    }
  </script>
</body>
</html>
